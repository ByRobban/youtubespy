name: YouTube Trends Spy

on:
  schedule:
    - cron: '0 9 * * 1' # Her Pazartesi saat 09:00
  workflow_dispatch:    # Bu, test etmek için elle çalıştırma butonu ekler

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install requests pandas google-api-python-client
      - name: Run Spy Script
        env:
          API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TG_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
